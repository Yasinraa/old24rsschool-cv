<body>
    <header class="header">
        <div class="wrapper header__wrapper">
            <a href="/christmas-shop/index.html" class="logo">
                <div class="logo_img">
                    <img src="/christmas-shop/img/snowflake.svg" alt="logo snowflake">
                </div>
                <h2 class="logo_text">the gifts</h2>
            </a>
            <nav class="header__navigation">
                <ul class="navigation">
                    <li class="navigation_item">
                        <a class="navigation_link" href="/christmas-shop/gifts.html">GIFT</a>
                    </li>
                    <li class="navigation_item">
                        <a class="navigation_link" href="/christmas-shop/index.html#about">about</a>
                    </li>
                    <li class="navigation_item">
                        <a class="navigation_link" href="/christmas-shop/index.html#gift">best</a>
                    </li>
                    <li class="navigation_item">
                        <a class="navigation_link" href="/christmas-shop/index.html#contacts">contacts</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="main">
        <section class="hero">
            <div class="wrapper hero__wrapper">
                <div class="hero__content">
                    <p class="caption">Merry christmas</p>
                    <h1>Gift yourself <br> the magic of new possibilities</h1>
                    <div class="hero__button">
                        <a class="hero_link" href="/christmas-shop/gifts.html">Explore Magical Gifts</a>
                    </div>
                    <p class="caption">and Happy New Year</p>
                </div>
            </div>
        </section>
        <section class="about" id="about">
            <div class="wrapper about__wrapper">
                <div class="about__content">
                    <p class="caption">About</p>
                    <p class="about_congratulation">Unleash your inner superhero!</p>
                    <p class="about_text">This New Year marks the beginning of your journey to inner harmony and new strengths.
                        We offer unique gifts that will
                        help you improve your life.</p>
                </div>
                <div class="about__img">
                    <img class='abour_img' src="/christmas-shop/img/img-compressed/santa.png" alt="Santa with snowman">
                </div>
            </div>
        </section>
        <section class="slider">
            <div class="wrapper slider__wrapper">
                <div class="slider__head">
                    <p class="caption">Become Happier!</p>   
                    <h2>IN THE NEW 2025</h2>
                </div>
                <div class="row">
                    <p class="text_image">LIVE</p>
                    <img class="img_row" src="/christmas-shop/img/img-compressed/snowman.png" alt="snowman image">
                    <p class="text_image">LOVE</p>
                    <img class="img_row" src="/christmas-shop/img/img-compressed/christmas-trees.png" alt="christmas-trees image">
                    <!-- <p class="text_image">LOVE</p> -->
                    <img class="img_row" src="/christmas-shop/img/img-compressed/christmas-tree-ball.png" alt="christmas-tree-ball image">
                    <p class="text_image">CREATE</p>
                    <img class="img_row" src="/christmas-shop/img/img-compressed/fairytale-house.png" alt="fairytale-house image">
                </div>
                <div class="button__arrows">
                    <button class="slideButton" disabled="disabled">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M18.5 12H6M6 12L12 6M6 12L12 18" stroke="white" stroke-linecap="round" stroke-linejoin="round"> 
                            </path>
                        </svg>
                    </button>
                    <button class="slideButton">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M6 12H18.5M18.5 12L12.5 6M18.5 12L12.5 18" stroke="white" stroke-linecap="round" stroke-linejoin="round">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
        </section>
        <section class="gifts" id="gift">
            <div class="wrapper gifts__wrapper">
                <p class="caption">Best Gifts</p>
                <h2 class="gitf_h2">especially for you</h2>
                <div class="cards">
                    <article class="card">
                        <img class="card_img" src="/christmas-shop/img/img-compressed/gift-for-work.png" alt="for word gift image">
                        <div class="card_text">
                            <h3 class="card_tagForWork">for work</h3>
                            <p class="card_header">Console.log Guru</p>
                        </div>
                    </article>
                    <article class="card">
                        <img class="card_img" src="/christmas-shop/img/img-compressed/gift-for-health.png" alt="for health gift image">
                        <div class="card_text">
                            <h3 class="card_tagForHealth">for health</h3>
                            <p class="card_header">Hydration bot</p>
                        </div>
                    </article>
                    <article class="card">
                        <img class="card_img" src="/christmas-shop/img/img-compressed/gift-for-work.png" alt="for word gift image">
                        <div class="card_text">
                            <h3 class="card_tagForWork">for work</h3>
                            <p class="card_header">Merge Master</p>
                        </div>
                    </article>
                    <article class="card">
                        <img class="card_img" src="/christmas-shop/img/img-compressed/gift-for-harmony.png" alt="for harmony gift image">
                        <div class="card_text">
                            <h3 class="card_tagForHarmony">for harmony</h3>
                            <p class="card_header">Spontaneous coding philosopher</p>
                        </div>
                    </article>
                </div>
            </div>
        </section>
        <section class="cta">
            <div class="wrapper cta__wrapper">
                <div class="cta__content">
                    <h2 class="cta_text">Ready to start your journey to a better version of yourself?</h2>
                    <div class="cta__button">
                        <a class="cta_link" href="/christmas-shop/gifts.html">Explore Magical Gifts</a>
                    </div>
                    <p class="caption">The New Year is Coming Soon...</p>
                    <ul class="cta_timerBlock">
                        <li class="timer_item">
                            <p class="timerNumber">47</p>
                            <p class="timerText">days</p>
                        </li>
                        <li class="timer_item">
                            <p class="timerNumber">5</p>
                            <p class="timerText">hours</p>
                        </li>
                        <li class="timer_item">
                            <p class="timerNumber">34</p>
                            <p class="timerText">minutes</p>
                        </li>
                        <li class="timer_item">
                            <p class="timerNumber">12</p>
                            <p class="timerText">seconds</p>
                        </li>
                    </ul>
                </div>
            </div>
        </section>
